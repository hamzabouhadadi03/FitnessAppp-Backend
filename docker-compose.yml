# =============================================================================
# FitProgress — Docker Compose de Développement
# Services : app (rechargement automatique), postgres, redis
# =============================================================================
version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Application FastAPI (dev — rechargement automatique)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: fitprogress_app_dev
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fitprogress_network

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    platform: linux/amd64
    container_name: fitprogress_postgres_dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fitprogress}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-fitprogress}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fitprogress} -d ${POSTGRES_DB:-fitprogress}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - fitprogress_network

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    platform: linux/amd64
    container_name: fitprogress_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fitprogress_network

  # ---------------------------------------------------------------------------
  # Celery Worker (dev — tâches push notifications)
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: fitprogress_celery_worker_dev
    env_file:
      - .env
    command: celery -A app.core.celery_app worker --loglevel=info --queues=default,notifications --concurrency=2
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fitprogress_network

  # ---------------------------------------------------------------------------
  # Celery Beat (dev — planificateur de rappels d'entraînement)
  # ---------------------------------------------------------------------------
  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: fitprogress_celery_beat_dev
    env_file:
      - .env
    command: celery -A app.core.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler --schedule=/tmp/celerybeat-schedule
    volumes:
      - .:/app
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - fitprogress_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  fitprogress_network:
    driver: bridge
