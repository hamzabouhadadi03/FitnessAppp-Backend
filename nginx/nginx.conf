# FitProgress — Nginx production config

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Docker internal DNS, refresh every 30s (avoids stale IPs on container restart)
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    server_tokens off;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # ---------------------------------------------------------------------------
    # Rate limiting — zones granulaires par catégorie d'endpoint
    #
    # auth_limit    :  5 req/min → ultra-strict anti-bruteforce (login, sync)
    # api_heavy     : 10 req/min → opérations CPU-intensive (progression, gamification)
    # api_limit     : 30 req/min → API générale (workouts, programs, exercises)
    # conn_limit    :             → connexions simultanées (protection Slowloris)
    # ---------------------------------------------------------------------------
    limit_req_zone  $binary_remote_addr zone=api_auth:10m   rate=5r/m;
    limit_req_zone  $binary_remote_addr zone=api_heavy:10m  rate=10r/m;
    limit_req_zone  $binary_remote_addr zone=api_limit:10m  rate=30r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Réponse 429 globale avec corps JSON et header Retry-After
    limit_req_status 429;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        listen [::]:80;
        server_name fitprogress.ovh;

        # Let's Encrypt ACME challenge — must stay HTTP
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;

        server_name fitprogress.ovh;

        # Certs from Let's Encrypt, mounted via Docker volumes
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # TLS 1.2/1.3 only — Mozilla modern config
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        ssl_stapling on;
        ssl_stapling_verify on;

        client_max_body_size 10M;

        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Slowloris protection
        limit_conn conn_limit 20;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'none'" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";

        # ------------------------------------------------------------------
        # Réponse 429 uniforme — JSON + Retry-After
        # ------------------------------------------------------------------
        error_page 429 = @rate_limited;
        location @rate_limited {
            default_type application/json;
            add_header Retry-After 60 always;
            add_header Content-Type "application/json" always;
            return 429 '{"error":"rate_limit_exceeded","detail":"Too many requests \u2014 please retry after 60 seconds."}';
        }

        # ------------------------------------------------------------------
        # Auth — ultra-strict anti-bruteforce (5 req/min, burst=2)
        # Regex a la priorité sur le préfixe /api/ pour ces routes.
        # ------------------------------------------------------------------
        location ~ ^/api/v1/auth/ {
            limit_req zone=api_auth burst=2 nodelay;

            set $backend "http://app:8000";
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $server_name;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
        }

        # ------------------------------------------------------------------
        # Opérations lourdes — progression & gamification (10 req/min, burst=5)
        # Calculs CPU-intensifs : moteur de progression, scores, historique.
        # ------------------------------------------------------------------
        location ~ ^/api/v1/(progression|gamification)/ {
            limit_req zone=api_heavy burst=5 nodelay;

            set $backend "http://app:8000";
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $server_name;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
        }

        # ------------------------------------------------------------------
        # API générale — workouts, programs, exercises, users (30 req/min, burst=10)
        # Catch-all pour tous les autres endpoints /api/
        # ------------------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;

            set $backend "http://app:8000";
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $server_name;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
        }

        # ------------------------------------------------------------------
        # Health check — pas de rate limit, pas de log
        # ------------------------------------------------------------------
        location /health {
            set $backend_health "http://app:8000/health";
            proxy_pass $backend_health;
            proxy_http_version 1.1;
            proxy_set_header Host $server_name;
            access_log off;
        }

        # ------------------------------------------------------------------
        # Readiness check — pas de rate limit, pas de log
        # Utilisé par le monitoring pour vérifier DB + Redis.
        # ------------------------------------------------------------------
        location /ready {
            set $backend_ready "http://app:8000/ready";
            proxy_pass $backend_ready;
            proxy_http_version 1.1;
            proxy_set_header Host $server_name;
            access_log off;
        }

        # ------------------------------------------------------------------
        # Métriques Prometheus — BLOQUÉES publiquement
        # Prometheus scrape directement http://app:8000/metrics via Docker network.
        # ------------------------------------------------------------------
        location /metrics {
            return 403;
        }

        # ------------------------------------------------------------------
        # Grafana — accessible uniquement depuis l'IP admin via tunnel SSH
        # (grafana écoute sur 127.0.0.1:3000 — pas besoin d'exposition nginx)
        # ------------------------------------------------------------------

        # Block /docs, /redoc, /openapi.json en production
        location / {
            return 404;
        }

        access_log /var/log/nginx/access.log combined;
        error_log /var/log/nginx/error.log warn;
    }
}
