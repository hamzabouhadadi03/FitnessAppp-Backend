# =============================================================================
# FitProgress — Configuration Nginx Complète pour la Production
#
# QU'EST-CE QUE NGINX ?
# ---------------------
# Nginx est un serveur web et reverse proxy haute performance. Dans notre
# architecture, il joue le rôle d'intermédiaire entre Internet et notre
# application FastAPI :
#
#   Internet  →  Nginx (port 443, HTTPS)  →  FastAPI (port 8000, interne Docker)
#
# Nginx s'occupe de :
#   - Terminer le chiffrement SSL/TLS (décrypter les requêtes HTTPS)
#   - Rediriger HTTP vers HTTPS automatiquement
#   - Limiter le débit (rate limiting) pour protéger l'API des abus
#   - Compresser les réponses (gzip) pour accélérer les transferts
#   - Ajouter des en-têtes de sécurité sur chaque réponse
#   - Transmettre les requêtes à FastAPI via le réseau Docker interne
#
# COMMENT FONCTIONNE LE SSL/TLS ?
# --------------------------------
# SSL (aujourd'hui TLS) chiffre la communication entre le navigateur et le
# serveur. Voici le mécanisme simplifié :
#   1. Le client demande une connexion sécurisée
#   2. Le serveur présente son certificat (signé par Let's Encrypt)
#   3. Le client vérifie que le certificat est valide et signé par une CA de confiance
#   4. Les deux parties négocient une clé de session éphémère (ECDHE)
#   5. Toute la communication est chiffrée avec cette clé
#
# QU'EST-CE QUE LET'S ENCRYPT ?
# ------------------------------
# Let's Encrypt est une autorité de certification (CA) gratuite et automatisée.
# Elle délivre des certificats SSL/TLS reconnus par tous les navigateurs.
# Les certificats sont valides 90 jours et se renouvellent automatiquement.
#
# COMMENT GÉNÉRER UN CERTIFICAT AVEC CERTBOT ?
# --------------------------------------------
# Certbot est l'outil officiel de Let's Encrypt. Étapes complètes :
#
# 1. Installer Certbot :
#      apt install certbot python3-certbot-nginx   (Debian/Ubuntu)
#      yum install certbot python3-certbot-nginx   (CentOS/RHEL)
#
# 2. Obtenir un certificat (méthode standalone — arrête Nginx temporairement) :
#      certbot certonly --standalone -d votredomaine.com -d www.votredomaine.com
#
# 3. Ou utiliser la méthode webroot (Nginx reste actif) :
#      certbot certonly --webroot -w /var/www/certbot -d votredomaine.com
#
#    Le bloc "location /.well-known/acme-challenge/" plus bas permet cette méthode.
#    Let's Encrypt vérifie que vous contrôlez le domaine en déposant un fichier
#    temporaire dans /var/www/certbot et en essayant d'y accéder via HTTP.
#
# 4. Avec Docker (recommandé pour la prod) :
#      docker run --rm -v /etc/letsencrypt:/etc/letsencrypt \
#        -v /var/www/certbot:/var/www/certbot \
#        certbot/certbot certonly --webroot \
#        -w /var/www/certbot -d votredomaine.com
#
# OÙ SONT STOCKÉS LES FICHIERS DE CERTIFICAT ?
# ---------------------------------------------
# Après génération, Certbot crée les fichiers dans :
#   /etc/letsencrypt/live/votredomaine.com/
#     ├── fullchain.pem   → Le certificat + toute la chaîne de CA (à utiliser pour ssl_certificate)
#     ├── privkey.pem     → Votre clé privée (JAMAIS partagée, à utiliser pour ssl_certificate_key)
#     ├── cert.pem        → Votre certificat seul (sans la chaîne)
#     └── chain.pem       → La chaîne intermédiaire uniquement
#
# Dans notre config Docker, ces fichiers sont montés dans le conteneur Nginx via :
#   volumes:
#     - /etc/letsencrypt/live/votredomaine.com/fullchain.pem:/etc/nginx/ssl/fullchain.pem:ro
#     - /etc/letsencrypt/live/votredomaine.com/privkey.pem:/etc/nginx/ssl/privkey.pem:ro
#
# RENOUVELLEMENT AUTOMATIQUE :
# ----------------------------
# Les certificats Let's Encrypt expirent après 90 jours. Pour renouveler :
#   certbot renew --quiet
# Ajoutez cette commande dans un cron job pour le faire automatiquement :
#   0 3 * * * certbot renew --quiet && nginx -s reload
# =============================================================================

# ---------------------------------------------------------------------------
# CONTEXTE PRINCIPAL (MAIN CONTEXT)
#
# Ces directives s'appliquent au processus Nginx global.
# worker_processes auto = Nginx crée autant de workers que de cœurs CPU disponibles.
# error_log au niveau "warn" : on ne veut pas les infos/debug en prod.
# ---------------------------------------------------------------------------
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# ---------------------------------------------------------------------------
# BLOC EVENTS
#
# Configure la gestion des connexions réseau.
# worker_connections : nombre max de connexions simultanées par worker.
# Avec worker_processes auto, connexions totales = workers × worker_connections.
# ---------------------------------------------------------------------------
events {
    worker_connections 1024;
}

# ---------------------------------------------------------------------------
# BLOC HTTP
#
# Tout ce qui concerne le protocole HTTP/HTTPS (serveurs virtuels, proxying,
# gzip, headers de sécurité, rate limiting, etc.) va dans ce bloc.
# ---------------------------------------------------------------------------
http {

    # Inclure les types MIME standard (text/html, application/json, image/png, etc.)
    # Nécessaire pour que Nginx envoie le bon Content-Type dans les réponses
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ---------------------------------------------------------------------------
    # RÉSOLVEUR DNS DOCKER
    #
    # 127.0.0.11 = adresse du résolveur DNS interne de Docker Compose.
    # Docker crée un serveur DNS interne pour résoudre les noms de services
    # (ex: "app", "postgres", "redis") en adresses IP de containers.
    #
    # valid=30s : Nginx met en cache la résolution DNS pendant 30 secondes.
    # Si un container redémarre et change d'IP, Nginx re-interroge le DNS
    # automatiquement toutes les 30 secondes.
    #
    # POURQUOI C'EST NÉCESSAIRE :
    # Sans cette directive, Nginx résout "app" UNE SEULE FOIS au démarrage.
    # Si le container FastAPI redémarre (changement d'IP), Nginx continue
    # d'utiliser l'ancienne IP → les requêtes échouent jusqu'au redémarrage Nginx.
    # Avec "resolver", la résolution est différée au moment de la requête → fiable.
    # ---------------------------------------------------------------------------
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    # Cacher la version de Nginx dans les réponses HTTP
    # Sécurité : empêche les attaquants de connaître la version exacte et ses vulnérabilités
    server_tokens off;

    # Optimisation des transferts de fichiers statiques (sendfile syscall)
    sendfile on;
    tcp_nopush on;

    # Délai de maintien des connexions HTTP keep-alive (65 s)
    keepalive_timeout 65;

    # ---------------------------------------------------------------------------
    # LIMITATION DE DÉBIT (RATE LIMITING)
    # Protège l'API contre les abus, les bots, et les attaques par force brute.
    # On définit une zone mémoire partagée de 10 Mo, limitée à 10 requêtes/seconde/IP.
    # 10 Mo de mémoire = environ 160 000 adresses IP suivies simultanément.
    # ---------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Code HTTP renvoyé quand la limite est dépassée (429 = Too Many Requests)
    limit_req_status 429;

    # Zone pour limiter le nombre de connexions simultanées par IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ---------------------------------------------------------------------------
    # COMPRESSION GZIP
    # Réduit la taille des réponses JSON, CSS, JS avant de les envoyer au client.
    # Exemple : une réponse JSON de 100 Ko peut passer à 20 Ko après compression.
    # Économise de la bande passante et accélère l'expérience utilisateur.
    # ---------------------------------------------------------------------------
    gzip on;

    # Ajoute l'en-tête "Vary: Accept-Encoding" pour que les CDN/caches sachent
    # qu'il existe des versions compressées et non compressées
    gzip_vary on;

    # Compresser aussi les réponses des backends proxifiés (notre FastAPI)
    gzip_proxied any;

    # Niveau de compression de 1 (rapide, peu compressé) à 9 (lent, très compressé)
    # 6 est un bon compromis entre CPU et taille de fichier
    gzip_comp_level 6;

    # Tampons internes pour la compression : 16 tampons de 8 Ko chacun
    gzip_buffers 16 8k;

    # Activer la compression seulement pour HTTP/1.1 et supérieur
    gzip_http_version 1.1;

    # Ne pas compresser les très petites réponses (overhead > gain en dessous de 256 octets)
    gzip_min_length 256;

    # Types MIME à compresser (JSON, JavaScript, CSS, SVG, XML, etc.)
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ---------------------------------------------------------------------------
    # BLOC 1 : Redirection HTTP → HTTPS
    #
    # Tout le trafic arrivant sur le port 80 (HTTP non chiffré) est redirigé
    # automatiquement vers HTTPS (port 443). C'est une bonne pratique de sécurité
    # obligatoire aujourd'hui.
    #
    # Exception : le challenge ACME de Let's Encrypt doit passer en HTTP
    # car il intervient AVANT l'installation du certificat.
    # ---------------------------------------------------------------------------
    server {
        # Écouter sur le port 80 (HTTP standard) en IPv4 et IPv6
        listen 80;
        listen [::]:80;

        # Remplacez "_" par votre vrai domaine en production (ex: api.fitprogress.com)
        # "_" = catch-all qui accepte n'importe quel nom de domaine
        server_name _;

        # ---------------------------------------------------------------------------
        # CHALLENGE ACME LET'S ENCRYPT
        #
        # Lors de la création ou du renouvellement d'un certificat, Let's Encrypt
        # dépose un fichier de vérification dans /.well-known/acme-challenge/
        # et tente d'y accéder via HTTP (port 80) pour prouver que vous contrôlez
        # bien le domaine.
        #
        # C'est pourquoi cette route NE doit PAS être redirigée vers HTTPS —
        # Let's Encrypt a besoin de la lire en HTTP pur.
        #
        # Processus ACME complet :
        #   1. Certbot génère un token aléatoire
        #   2. Il place ce token dans /var/www/certbot/.well-known/acme-challenge/TOKEN
        #   3. Let's Encrypt essaie de lire http://votredomaine.com/.well-known/acme-challenge/TOKEN
        #   4. Si la réponse correspond, la propriété du domaine est validée
        #   5. Let's Encrypt signe et envoie le certificat
        # ---------------------------------------------------------------------------
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Rediriger toutes les autres requêtes HTTP vers HTTPS
        # 301 = redirection permanente (les navigateurs et Google mémorisent cette règle)
        #
        # SÉCURITÉ — variable server_name (config) vs variable host (requête cliente) :
        # ❌ variable host     = valeur de l'en-tête HTTP "Host" fourni par le CLIENT.
        #                        Contrôlable par un attaquant : il peut envoyer "Host: evil.com"
        #                        et se retrouver redirigé vers evil.com (Host Header Injection).
        # ✅ variable server_name = première valeur de la directive server_name (configurée par nous).
        #                        Jamais influencée par le contenu de la requête → sécurisé.
        # En prod, remplacez server_name _ par votre vrai domaine (ex: api.fitprogress.com)
        # et $server_name prendra automatiquement cette valeur.
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # ---------------------------------------------------------------------------
    # BLOC 2 : Serveur HTTPS Principal
    #
    # Ce bloc gère tout le trafic chiffré (HTTPS) sur le port 443.
    # C'est ici que se passe la "terminaison SSL" : Nginx décrypte les données
    # reçues du client et les transmet en clair à FastAPI sur le réseau interne Docker.
    # FastAPI n'a ainsi jamais à gérer SSL directement.
    # ---------------------------------------------------------------------------
    server {
        # Écouter sur le port 443 (HTTPS standard) avec SSL
        # HTTP/2 activé via la directive "http2 on" (syntaxe Nginx ≥ 1.25.1)
        # HTTP/2 améliore les performances : multiplexage des requêtes, compression d'en-têtes
        # Ancienne syntaxe dépréciée : listen 443 ssl http2 → remplacée par http2 on;
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;

        # Remplacez "_" par votre vrai domaine en production (ex: api.fitprogress.com)
        server_name _;

        # ---------------------------------------------------------------------------
        # CERTIFICATS SSL — GÉNÉRÉS PAR LET'S ENCRYPT
        #
        # fullchain.pem : Contient VOTRE certificat + les certificats intermédiaires
        #                 de Let's Encrypt. Le navigateur a besoin de toute la chaîne
        #                 pour faire confiance à votre certificat.
        #
        # privkey.pem   : Votre clé privée RSA/ECDSA.
        #                 GARDEZ-LA SECRÈTE ! Elle ne doit jamais quitter votre serveur.
        #                 Si elle est compromise, invalidez et régénérez le certificat.
        #                 Permissions recommandées : chmod 600 privkey.pem
        #
        # Ces fichiers sont montés en lecture seule (:ro) depuis l'hôte via Docker volumes.
        # En production avec Certbot, ils sont dans /etc/letsencrypt/live/votredomaine.com/
        # ---------------------------------------------------------------------------
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # ---------------------------------------------------------------------------
        # CONFIGURATION TLS MODERNE
        #
        # On n'autorise que TLS 1.2 et TLS 1.3 (les versions sécurisées).
        # TLS 1.0 et TLS 1.1 sont obsolètes et vulnérables (POODLE, BEAST...).
        #
        # TLS 1.3 : Version la plus récente (2018). Plus rapide (1 aller-retour au lieu de 2)
        #           et plus sécurisée. Supportée par tous les navigateurs modernes.
        # TLS 1.2 : Encore nécessaire pour la compatibilité avec les appareils anciens.
        # ---------------------------------------------------------------------------
        ssl_protocols TLSv1.2 TLSv1.3;

        # ---------------------------------------------------------------------------
        # SUITES DE CHIFFREMENT (CIPHER SUITES)
        #
        # Une suite de chiffrement définit les algorithmes utilisés pour :
        #   - L'échange de clés (ECDHE = Elliptic Curve Diffie-Hellman Ephemeral)
        #   - L'authentification (RSA ou ECDSA)
        #   - Le chiffrement des données (AES-128-GCM, AES-256-GCM, ChaCha20)
        #   - La vérification d'intégrité (SHA256, SHA384, Poly1305)
        #
        # PERFECT FORWARD SECRECY (PFS) :
        # Les suites ECDHE garantissent la confidentialité persistante.
        # Même si votre clé privée est compromise dans le futur, les sessions
        # passées ne pourront pas être déchiffrées car chaque session utilisait
        # une clé éphémère différente (jetée après la session).
        #
        # Cette liste est la configuration recommandée par Mozilla pour la compatibilité
        # moderne : https://ssl-config.mozilla.org/
        # ---------------------------------------------------------------------------
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;

        # Laisser le CLIENT choisir la suite de chiffrement parmi celles autorisées
        # (off = le client décide, ce qui est recommandé car les clients modernes
        # connaissent leurs propres capacités matérielles, ex: accélération AES-NI)
        ssl_prefer_server_ciphers off;

        # ---------------------------------------------------------------------------
        # CACHE DE SESSION TLS
        #
        # Stocker les paramètres de session SSL en mémoire partagée (10 Mo).
        # Évite de répéter la négociation TLS complète pour les connexions répétées
        # du même client → améliore les performances de 20-30%.
        #
        # ssl_session_timeout : Durée de vie des sessions en cache (1 jour)
        # ssl_session_tickets off : Désactivé car les tickets nécessitent une clé
        #   de rotation régulière et peuvent affaiblir la confidentialité persistante
        # ---------------------------------------------------------------------------
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ---------------------------------------------------------------------------
        # OCSP STAPLING — Vérification de révocation de certificat
        #
        # Le protocole OCSP (Online Certificate Status Protocol) permet de vérifier
        # qu'un certificat n'a pas été révoqué.
        #
        # Sans stapling : Le navigateur contacte Let's Encrypt à chaque connexion
        #                 pour vérifier si le certificat est toujours valide → lent.
        #
        # Avec stapling : Nginx interroge Let's Encrypt en arrière-plan et "agraphe"
        #                 (staple) la réponse OCSP à la poignée de main TLS.
        #                 Le navigateur obtient la preuve de validité directement
        #                 depuis Nginx → plus rapide et protège la vie privée.
        #
        # ssl_stapling_verify : Nginx vérifie lui-même la réponse OCSP (bonne pratique)
        # ---------------------------------------------------------------------------
        ssl_stapling on;
        ssl_stapling_verify on;

        # Taille maximale du corps d'une requête HTTP acceptée (uploads de fichiers)
        # 10 Mo est suffisant pour nos besoins actuels
        client_max_body_size 10M;

        # ---------------------------------------------------------------------------
        # DÉLAIS D'ATTENTE DU PROXY
        # Ces valeurs évitent que Nginx attende indéfiniment une réponse de FastAPI
        # proxy_connect_timeout : Temps max pour établir la connexion TCP vers FastAPI
        # proxy_read_timeout    : Temps max pour recevoir une réponse complète de FastAPI
        # proxy_send_timeout    : Temps max pour envoyer la requête complète à FastAPI
        # ---------------------------------------------------------------------------
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Limite à 20 connexions simultanées par adresse IP
        # Protège contre les attaques de type slowloris (connexions maintenues ouvertes)
        limit_conn conn_limit 20;

        # ---------------------------------------------------------------------------
        # EN-TÊTES DE SÉCURITÉ HTTP
        #
        # Ces en-têtes instruisent le navigateur du client sur la politique de sécurité.
        # Nginx les ajoute sur TOUTES les réponses (le mot-clé "always" inclut les erreurs).
        #
        # X-Content-Type-Options "nosniff"
        #   → Interdit au navigateur de "deviner" le type MIME d'un fichier.
        #     Empêche une attaque où un attaquant uploade un fichier .txt contenant
        #     du JavaScript, que le navigateur exécuterait si il devinait le mauvais type.
        #
        # X-Frame-Options "DENY"
        #   → Interdit d'afficher notre site dans une <iframe> sur un autre site.
        #     Protège contre le clickjacking (superposer une iframe invisible sur un bouton).
        #
        # X-XSS-Protection "1; mode=block"
        #   → Active le filtre XSS intégré dans les vieux navigateurs (IE, ancien Chrome).
        #     Bloque la page si une attaque XSS est détectée. (Les navigateurs modernes
        #     utilisent CSP à la place, mais cet en-tête assure la rétrocompatibilité.)
        #
        # Strict-Transport-Security (HSTS) "max-age=31536000; includeSubDomains"
        #   → Force le navigateur à utiliser HTTPS pour ce domaine (et tous ses sous-domaines)
        #     pendant 1 an (31536000 secondes), même si l'utilisateur tape http://.
        #     ATTENTION : Une fois activé, très difficile à annuler avant l'expiration !
        #
        # Content-Security-Policy "default-src 'none'"
        #   → Politique la plus restrictive : n'autorise aucune ressource externe.
        #     Notre API ne sert pas de HTML/CSS/JS, donc 'none' est approprié.
        #     Pour une app web complète, cette valeur serait beaucoup plus détaillée.
        #
        # Referrer-Policy "strict-origin-when-cross-origin"
        #   → Contrôle quelle information est envoyée dans l'en-tête Referer.
        #     Pour les requêtes vers d'autres origines : envoie seulement l'origine
        #     (https://monsite.com), pas le chemin complet (https://monsite.com/user/123).
        #
        # Permissions-Policy
        #   → Désactive l'accès à des APIs sensibles du navigateur.
        #     Notre API n'a pas besoin de la géolocalisation, du micro, ni de la caméra.
        # ---------------------------------------------------------------------------
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'none'" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";

        # ---------------------------------------------------------------------------
        # ROUTES API — Avec limitation de débit
        #
        # Toutes les requêtes vers /api/ passent par ici.
        # Le rate limiting est appliqué : 10 req/s avec un burst de 20.
        #
        # "burst=20 nodelay" : Autorise jusqu'à 20 requêtes supplémentaires en rafale
        #   sans délai (nodelay), mais elles comptent dans la limite.
        #   Après le burst, les requêtes dépassant 10/s reçoivent une erreur 429.
        #
        # PROXY VERS FASTAPI :
        # "app:8000" = réseau interne Docker (le service "app" du docker-compose)
        # FastAPI n'est pas exposé directement à Internet, seulement via Nginx.
        #
        # En-têtes transmis à FastAPI :
        #   Host             : $server_name (notre domaine configuré côté serveur)
        #                      SÉCURITÉ : on n'utilise PAS la variable "host" de Nginx
        #                      (en-tête HTTP fourni par le client, injectable par un attaquant
        #                      via Host Header Injection). $server_name est défini dans notre
        #                      config → valeur sûre, jamais contrôlée par le client.
        #   X-Real-IP        : Adresse IP réelle du client (sinon FastAPI verrait l'IP de Nginx)
        #   X-Forwarded-For  : Historique des proxys traversés (liste d'IPs)
        #   X-Forwarded-Proto: Protocole original (https) — FastAPI sait que la requête
        #                      vient en HTTPS même si lui la reçoit en HTTP
        #   Connection ""    : Désactive le header Connection pour le keepalive HTTP/1.1
        # ---------------------------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            # Utiliser une variable pour l'upstream : la résolution DNS est différée
            # au moment de la requête (pas au démarrage de Nginx).
            # Sans variable : Nginx résout "app" au démarrage → échoue si Docker DNS
            # n'est pas disponible (ex: CI/CD, nginx -t hors réseau Compose).
            set $backend "http://app:8000";
            proxy_pass $backend;
            proxy_http_version 1.1;
            proxy_set_header Host $server_name;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Supprimer les en-têtes du backend qui révèlent des infos internes
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
        }

        # ---------------------------------------------------------------------------
        # ROUTE DE SANTÉ — Sans limitation de débit
        #
        # Utilisée par Docker, les orchestrateurs (Kubernetes, ECS) et les outils
        # de monitoring (Datadog, UptimeRobot) pour vérifier que l'app est vivante.
        # Pas de rate limiting car les health checks sont fréquents et légitimes.
        # access_log off : Ne pas polluer les logs avec des milliers de health checks.
        # ---------------------------------------------------------------------------
        location /health {
            # Même approche variable que /api/ pour la résolution DNS différée
            set $backend_health "http://app:8000/health";
            proxy_pass $backend_health;
            proxy_http_version 1.1;
            # $server_name (config serveur) au lieu de la variable host (client) — même raison de sécurité que /api/
            proxy_set_header Host $server_name;
            access_log off;
        }

        # ---------------------------------------------------------------------------
        # BLOQUER TOUS LES AUTRES CHEMINS
        #
        # Toute URL qui ne correspond pas à /api/ ou /health retourne 404.
        # Cela empêche l'accès direct aux endpoints internes de FastAPI
        # (comme /docs, /redoc, /openapi.json) en production.
        # En développement, ces routes sont accessibles directement sur le port 8000.
        # ---------------------------------------------------------------------------
        location / {
            return 404;
        }

        # ---------------------------------------------------------------------------
        # JOURNALISATION (LOGS)
        #
        # access.log : Une ligne par requête HTTP reçue (IP, URL, statut, durée...)
        #   Format "combined" = format Apache standard, compatible avec tous les outils
        #   d'analyse de logs (GoAccess, AWStats, ELK Stack, etc.)
        #
        # error.log : Erreurs Nginx (niveau "warn" et supérieur : error, crit, alert, emerg)
        #   En production, éviter "debug" ou "info" qui génèrent trop de volume.
        # ---------------------------------------------------------------------------
        access_log /var/log/nginx/access.log combined;
        error_log /var/log/nginx/error.log warn;
    }

} # fin du bloc http
