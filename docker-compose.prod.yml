# =============================================================================
# FitProgress — Docker Compose de Production
# Services : app (4 workers), postgres, redis, nginx (terminaison SSL)
# Limites de ressources appliquées. Politique de redémarrage : unless-stopped.
# =============================================================================
version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Application FastAPI (production — 4 workers, sans rechargement automatique)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    container_name: fitprogress_app_prod
    env_file:
      - .env
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - fitprogress_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Nginx — Terminaison SSL + reverse proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: fitprogress_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - fitprogress_network

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: fitprogress_postgres_prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - fitprogress_network

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: fitprogress_redis_prod
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - fitprogress_network

  # ---------------------------------------------------------------------------
  # Celery Worker (production — 4 workers concurrents)
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    container_name: fitprogress_celery_worker_prod
    env_file:
      - .env
    command: celery -A app.core.celery_app worker --loglevel=info --queues=default,notifications --concurrency=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - fitprogress_network

  # ---------------------------------------------------------------------------
  # Celery Beat (production — planificateur de rappels d'entraînement)
  # ---------------------------------------------------------------------------
  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    container_name: fitprogress_celery_beat_prod
    env_file:
      - .env
    command: celery -A app.core.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler --schedule=/tmp/celerybeat-schedule
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - fitprogress_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local

networks:
  fitprogress_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
